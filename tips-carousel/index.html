<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ORNY Tips Carousel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="phone-frame" aria-label="קרוסלת טיפים">
      <div class="carousel" id="carousel">
        <div class="track" id="track">
          <article class="slide cover-slide" aria-label="עמוד פתיחה">
            <div class="cover-title">ORNY</div>
          </article>

          <article class="slide">
            <img src="https://res.cloudinary.com/dvj8hnuao/image/upload/v1781612374/tip-001/slide-01.png" alt="טיפ 1 - שקופית 1" />
          </article>

          <article class="slide">
            <img src="https://res.cloudinary.com/dvj8hnuao/image/upload/v1781612375/tip-001/slide-02.png" alt="טיפ 1 - שקופית 2" />
          </article>

          <article class="slide">
            <img src="https://res.cloudinary.com/dvj8hnuao/image/upload/v1781612377/tip-001/slide-03.png" alt="טיפ 1 - שקופית 3" />
          </article>

          <article class="slide">
            <img src="https://res.cloudinary.com/dvj8hnuao/image/upload/v1781612377/tip-001/slide-04.png" alt="טיפ 1 - שקופית 4" />
          </article>

          <article class="slide">
            <img src="https://res.cloudinary.com/dvj8hnuao/image/upload/v1781612377/tip-001/slide-05.png" alt="טיפ 1 - שקופית 5" />
          </article>
        </div>
      </div>

      <nav class="dots" id="dots" aria-label="ניווט שקופיות"></nav>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
