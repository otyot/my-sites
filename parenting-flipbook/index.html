<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool Parent - Parenting Tips Carousel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 540px;
            aspect-ratio: 9 / 16;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .carousel-slides {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #fafafa, #ffffff);
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 30px;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            text-align: center;
        }

        .slide.active {
            opacity: 1;
            z-index: 10;
        }

        .slide-image {
            width: 100%;
            max-width: 380px;
            height: auto;
            max-height: 55%;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 8px;
            background: white;
        }

        .slide-text {
            font-size: 16px;
            line-height: 1.7;
            color: #333;
            font-weight: 500;
            word-wrap: break-word;
            letter-spacing: 0.3px;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 25px;
            background: #f9f9f9;
            border-top: 1px solid #e8e8e8;
        }

        .nav-button {
            background: #4a90e2;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .nav-button:hover {
            background: #3a7bc8;
            transform: scale(1.05);
        }

        .nav-button:active {
            transform: scale(0.98);
        }

        .dots-container {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex: 1;
            padding: 0 15px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d0d0d0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot:hover {
            background: #a0a0a0;
        }

        .dot.active {
            background: #4a90e2;
            transform: scale(1.3);
        }

        @media (max-width: 600px) {
            .carousel-container {
                border-radius: 15px;
            }

            .slide {
                padding: 40px 25px;
            }

            .slide-text {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="carousel-container">
        <div class="carousel-slides">
            
                <div class="slide active">
                    
                    <div class="slide-text"></div>
                </div>
            
                <div class="slide ">
                    
                    <div class="slide-text"></div>
                </div>
            
                <div class="slide ">
                    
                    <div class="slide-text"></div>
                </div>
            
                <div class="slide ">
                    
                    <div class="slide-text"></div>
                </div>
            
                <div class="slide ">
                    
                    <div class="slide-text"></div>
                </div>
            
        </div>

        <div class="navigation">
            <button class="nav-button" id="prevBtn" aria-label="Previous slide">→</button>
            <div class="dots-container">
                <div class="dot active" data-index="0"></div><div class="dot " data-index="1"></div><div class="dot " data-index="2"></div><div class="dot " data-index="3"></div><div class="dot " data-index="4"></div>
            </div>
            <button class="nav-button" id="nextBtn" aria-label="Next slide">←</button>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        const totalSlides = slides.length;

        function showSlide(index) {
            currentSlide = (index + totalSlides) % totalSlides;
            slides.forEach((s, i) => s.classList.toggle('active', i === currentSlide));
            dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide));
        }

        document.getElementById('nextBtn').addEventListener('click', () => showSlide(currentSlide + 1));
        document.getElementById('prevBtn').addEventListener('click', () => showSlide(currentSlide - 1));
        dots.forEach(dot => dot.addEventListener('click', (e) => showSlide(parseInt(e.target.dataset.index))));
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') showSlide(currentSlide - 1);
            if (e.key === 'ArrowLeft') showSlide(currentSlide + 1);
        });
    </script>
</body>
</html>
