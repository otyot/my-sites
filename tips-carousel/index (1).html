<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ORNY</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="carousel-shell" aria-label="קרוסלת טיפים">
      <div class="carousel" id="carousel">
        <div class="track" id="track">
          <article class="slide cover-slide">
            <div class="cover-content">
              <div class="cover-title">ORNY</div>
              <div class="version-label">ChatGPT v3</div>
            </div>
          </article>

          <article class="slide">
            <img src="https://res.cloudinary.com/dvj8hnuao/image/upload/v1781612374/tip-001/slide-01.png" alt="שקופית 1" />
          </article>

          <article class="slide">
            <img src="https://res.cloudinary.com/dvj8hnuao/image/upload/v1781612375/tip-001/slide-02.png" alt="שקופית 2" />
          </article>

          <article class="slide">
            <img src="https://res.cloudinary.com/dvj8hnuao/image/upload/v1781612377/tip-001/slide-03.png" alt="שקופית 3" />
          </article>

          <article class="slide">
            <img src="https://res.cloudinary.com/dvj8hnuao/image/upload/v1781612377/tip-001/slide-04.png" alt="שקופית 4" />
          </article>

          <article class="slide">
            <img src="https://res.cloudinary.com/dvj8hnuao/image/upload/v1781612377/tip-001/slide-05.png" alt="שקופית 5" />
          </article>
        </div>
      </div>

      <div class="dots" id="dots" aria-label="נקודות ניווט"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
